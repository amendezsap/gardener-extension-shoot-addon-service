name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build build-admission

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Helm lint
        run: |
          helm lint charts/gardener-extension-shoot-addon-service
          helm lint charts/gardener-extension-admission-shoot-addon-service

  verify-addons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate addon manifest
        run: |
          if [ -f charts/embedded/addons/manifest.yaml ]; then
            make validate
          else
            echo "No embedded addon manifest — skipping (runtime config mode)"
          fi

      - name: Verify embedded addons
        run: |
          if [ -f charts/embedded/addons/manifest.yaml ]; then
            make verify-prepare
          else
            echo "No embedded addons — skipping (runtime config mode)"
          fi

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE compliance check
        uses: fsfe/reuse-action@v4
