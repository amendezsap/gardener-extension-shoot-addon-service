apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shoot-addon-admission-webhook
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: shoot-addon-admission
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 10250
          protocol: TCP
