apiVersion: v1
kind: ServiceAccount
metadata:
  name: gardener-extension-shoot-addon-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gardener-extension-shoot-addon-service
    app.kubernetes.io/instance: shoot-addon-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gardener-extension-shoot-addon-service
  labels:
    app.kubernetes.io/name: gardener-extension-shoot-addon-service
    app.kubernetes.io/instance: shoot-addon-service
rules:
  - apiGroups:
      - extensions.gardener.cloud
    resources:
      - extensions
      - extensions/status
      - clusters
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - extensions.gardener.cloud
    resources:
      - infrastructures
      - infrastructures/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - resources.gardener.cloud
    resources:
      - managedresources
      - managedresources/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - patch
      - update
      - delete
  # Hook resources are applied directly by the extension (not via MR)
  # for seed renders and delete hook lifecycle management.
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get
      - create
      - update
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - create
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gardener-extension-shoot-addon-service
  labels:
    app.kubernetes.io/name: gardener-extension-shoot-addon-service
    app.kubernetes.io/instance: shoot-addon-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gardener-extension-shoot-addon-service
subjects:
  - kind: ServiceAccount
    name: gardener-extension-shoot-addon-service
    namespace: {{ .Release.Namespace }}
