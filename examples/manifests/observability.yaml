apiVersion: addons.gardener.cloud/v1alpha1
kind: AddonManifest
defaultNamespace: observability

# Global AWS — node-level policies (provider-aws only, skipped on other providers)
globalAWS:
  iamPolicies:
    - CloudWatchAgentServerPolicy
    - service-role/AmazonAPIGatewayPushToCloudWatchLogs
  vpcEndpoints:
    - service: logs

addons:
  - name: fluent-bit
    chart:
      oci: oci://registry.example.com/charts/fluent-bit
      version: "0.56.0"
    valuesPath: fluent-bit/values
    enabled: true
    shootValues:
      fullnameOverride: fluent-bit
    image:
      valuesKey: image

  - name: container-report
    chart:
      path: container-report/chart
    valuesPath: container-report/values
    enabled: false
